name: EscapePlugin
version: '1.0-SNAPSHOT'
main: yd.kingdom.escapePlugin.EscapePlugin
api-version: '1.21'
commands:
  관리자:
    description: 게임 관리자 지정 및 관리용 명령어
    usage: /관리자 <player>
  아이템:
    description: 특수 아이템 지급
    usage: /아이템 <item> <player>
  직업:
    description: 플레이어 직업 조회
    usage: /직업 <player>
  영역:
    description: 플레이어 영역 조회
    usage: /영역 <player>
  도우미:
    description: 특정 플레이어를 도우미로 지정하고 해당 직업으로 설정합니다.
    usage: /도우미 <플레이어> <직업>
  도우미해제:
    description: 특정 플레이어의 도우미 권한을 해제하고 자유민으로 설정합니다.
    usage: /도우미해제 <플레이어>
  자유민:
    description: 특정 플레이어를 자유민으로 설정합니다.
    usage: /자유민 <플레이어>
  게임시작:
    description: 게임을 시작하고 직업을 랜덤 분배합니다.
    usage: /게임시작
    permission: missiongame.admin
  직업해제:
    description: 특정 플레이어의 직업을 해제하고 자유민으로 설정합니다.
    usage: /직업해제 <플레이어>
    permission: escape.admin
  머리:
    description: config에 설정된 히든 드롭 머리와 동일한 메타데이터를 가진 모든 직업의 머리를 지급합니다.
    usage: /머리 <플레이어>
    permission: escape.admin
permissions:
  escape.admin:
    description: 모든 관리자 명령어 사용 권한
    default: op